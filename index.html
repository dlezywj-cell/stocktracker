<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>行业强弱追踪 (诊断版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --text-main: #1d1d1f; --text-sec: #86868b;
            --primary: #007aff; --success: #34c759; --danger: #ff3b30; --radius: 12px;
            --header-bg: #f2f4f8; 
        }
        html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; }
        header { background: #fff; border-bottom: 1px solid #e5e5e5; height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
        .app-title { font-weight: 700; font-size: 15px; }
        
        .control-panel { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e5e5e5; overflow-x: auto; }
        .date-inp { border: 1px solid #ddd; padding: 4px; border-radius: 6px; font-size: 12px; }

        .workspace { flex: 1; display: flex; gap: 10px; padding: 10px; overflow: hidden; }
        .chart-wrapper { flex: 1; background: var(--card); border-radius: var(--radius); position: relative; }
        #chart-container { width: 100%; height: 100%; }

        .list-wrapper { width: 280px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .data-list { flex: 1; background: var(--card); border-radius: var(--radius); overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* 诊断报告区域样式 */
        .debug-panel { 
            height: 180px; background: #2c3e50; color: #ecf0f1; border-radius: var(--radius); 
            padding: 10px; font-family: monospace; font-size: 11px; overflow-y: auto; border: 2px solid var(--danger);
        }
        .debug-title { color: #e74c3c; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #555; }

        .list-item { padding: 8px 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .up { color: var(--danger); } .down { color: var(--success); }
        .loading-mask { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
    </style>
</head>
<body>

<header>
    <div class="app-title">📈 行业追踪诊断版</div>
    <div style="font-size:12px; color:var(--text-sec)" id="updateInfo">数据加载中...</div>
</header>

<div class="control-panel">
    <input type="date" id="startDate" class="date-inp" onchange="runAnalysis()">
    <span>至</span>
    <input type="date" id="endDate" class="date-inp" onchange="runAnalysis()">
    <button onclick="fetchData()" style="padding:4px 10px">刷新数据</button>
</div>

<div class="workspace">
    <div class="chart-wrapper">
        <div id="loader" class="loading-mask">加载中...</div>
        <div id="chart-container"></div>
    </div>
    <div class="list-wrapper">
        <div class="data-list" id="rankList"></div>
        
        <!-- 诊断报告框 -->
        <div class="debug-panel" id="debugPanel">
            <div class="debug-title">🔍 诊断报告 (反馈给助手)</div>
            <div id="debugContent">等待数据加载...</div>
        </div>
    </div>
</div>

<script>
    let rawData = null, myChart = null, globalDates = [];

    async function fetchData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch('industry_data.json?t=' + Date.now());
            rawData = await res.json();
            globalDates = rawData.dates;
            document.getElementById('updateInfo').innerText = "最后更新: " + rawData.last_update;
            
            runAnalysis();
            printDebugInfo();
        } catch (e) {
            document.getElementById('debugContent').innerHTML = "<span style='color:red'>加载失败: " + e.message + "</span>";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // 核心显示逻辑
    function runAnalysis() {
        if(!rawData) return;
        const sDate = document.getElementById('startDate').value;
        const eDate = document.getElementById('endDate').value;

        // 1. 计算索引 (采用最严谨的边界计算)
        let sIdx = globalDates.findIndex(d => d >= sDate);
        if(sIdx < 0) sIdx = 0;

        let eIdx = globalDates.findIndex(d => d > eDate);
        if(eIdx === -1) eIdx = globalDates.length - 1;
        else eIdx = Math.max(0, eIdx - 1);

        // 2. 准备图表数据
        const industryNames = Object.keys(rawData.data).slice(0, 10); // 默认显示前10个
        const series = industryNames.map(name => {
            const vals = rawData.data[name];
            const base = vals[sIdx] || 1;
            return {
                name: name,
                type: 'line',
                smooth: true,
                showSymbol: false,
                data: vals.map(v => v ? parseFloat((v/base).toFixed(4)) : null)
            };
        });

        // 3. 渲染
        if(!myChart) myChart = echarts.init(document.getElementById('chart-container'));
        myChart.setOption({
            grid: { left: 50, right: 20, top: 20, bottom: 40 },
            xAxis: { type: 'category', data: globalDates, boundaryGap: false },
            yAxis: { type: 'value', scale: true, axisLabel: { formatter: v => ((v-1)*100).toFixed(1) + '%' } },
            dataZoom: [{ startValue: sIdx, endValue: eIdx }, { type: 'inside' }],
            tooltip: { trigger: 'axis' },
            series: series
        }, true);

        // 4. 列表渲染
        const listHtml = industryNames.map(name => {
            const vals = rawData.data[name];
            const v1 = vals[sIdx], v2 = vals[eIdx];
            const pct = (v1 && v2) ? ((v2-v1)/v1*100).toFixed(2) : '--';
            return `<div class="list-item"><span>${name}</span><span class="${pct>0?'up':'down'}">${pct}%</span></div>`;
        }).join('');
        document.getElementById('rankList').innerHTML = listHtml;
    }

    // --- 关键诊断打印函数 ---
    function printDebugInfo() {
        const content = document.getElementById('debugContent');
        const dates = rawData.dates;
        const lastIdx = dates.length - 1;
        
        // 取第一个行业的数据做样本
        const sampleName = Object.keys(rawData.data)[0];
        const sampleData = rawData.data[sampleName];

        let html = "";
        html += `1. 数据总长度: ${dates.length} 条\n`;
        html += `2. 最后三天日期:\n`;
        html += `   [${lastIdx-2}]: ${dates[lastIdx-2] || '无'}\n`;
        html += `   [${lastIdx-1}]: ${dates[lastIdx-1] || '无'}\n`;
        html += `   [${lastIdx}]: ${dates[lastIdx] || '无'}\n`;
        
        html += `\n3. 样本(${sampleName.substring(0,4)})最后三日数值:\n`;
        html += `   [${lastIdx-2}]: ${sampleData[lastIdx-2]}\n`;
        html += `   [${lastIdx-1}]: ${sampleData[lastIdx-1]}\n`;
        html += `   [${lastIdx}]: ${sampleData[lastIdx]}\n`;

        const eDate = document.getElementById('endDate').value;
        const findTest = dates.findIndex(d => d > eDate);
        html += `\n4. 逻辑测试:\n`;
        html += `   选择结束日期: ${eDate}\n`;
        html += `   findIndex(>结束日期): ${findTest}\n`;
        
        content.innerText = html;
        
        // 如果最后一天数值是空的，亮红警告
        if (sampleData[lastIdx] === null || sampleData[lastIdx] === undefined) {
            content.innerHTML += `\n<span style="color:#ff7675; font-weight:bold">⚠️ 警告：最后一天数值缺失(Null)！</span>`;
        }
    }

    // 初始化
    const d = new Date();
    document.getElementById('endDate').valueAsDate = d;
    d.setDate(d.getDate() - 30);
    document.getElementById('startDate').valueAsDate = d;
    fetchData();
    window.onresize = () => myChart && myChart.resize();
</script>

</body>
</html>
