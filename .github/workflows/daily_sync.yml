name: Update Stock Data

on:
  schedule:
    # 稍微推迟一点，北京时间 21:30 (UTC 13:30)，确保申万数据完全入库
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

# 解决 Node.js 20 警告的环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 稍微提高下 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas requests

    - name: Run data fetch script
      env:
        TZ: Asia/Shanghai
      run: python update_data.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add .
        
        # 优化提交逻辑：只在有 .json 变更时提交
        if git diff --staged --quiet; then
          echo "No changes detected in industry_data.json"
        else
          git commit -m "Auto update industry data: $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push origin main
          echo "Push successful!"
        fi
